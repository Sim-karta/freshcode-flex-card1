<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script
            src="https://kit.fontawesome.com/YOUR_KIT_CODE.js"
            crossorigin="anonymous"
        ></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="./assets/styles/reset.css" />
        <link rel="stylesheet" href="./assets/styles/styles.css" />
    </head>
    <body>
        <article class="card">
            <div class="card__header">
                <div class="card__header-avatar">
                    <img
                        src="./assets/images/cat.jpg"
                        alt="avatar"
                        class="card__header-img"
                    />
                    <button class="card__header-star-btn">
                        <i class="fa-solid fa-star"></i>
                    </button>
                </div>
                <h2 class="card__header-name">Lorem, ipsum.</h2>
                <p class="card__header-earning">Lorem, ipsum dolor.</p>
            </div>
            <div class="card__body">
                <p class="card__body-address">Lorem, ipsum. 15</p>
                <p class="card__body-city">Lorem ipsum dolor sit.</p>
                <p class="card__body-description">
                    Lorem ipsum, dolor sit amet consectetur adipisicing elit.
                    Dolor adipisci voluptatum molestiae nulla quidem quia?
                </p>
                <a href="" class="card__body-view button">VIEW CV</a>
                <a href="" class="card__body-offer button button--blue"
                    >MAKE OFFER</a
                >
                <p class="card__body-status">Online</p>
            </div>
        </article>
    </body>
</html>
